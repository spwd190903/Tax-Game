<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>หน้าหลัก: ตะลุยโลกภาษี</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            font-family: 'Mali', cursive;
            background-color: #e0f2fe; /* ธีมสีฟ้าสดใสสำหรับหน้าหลัก */
            background-image: radial-gradient(#bae6fd 1.5px, transparent 1.5px), radial-gradient(#bae6fd 1.5px, #e0f2fe 1.5px);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
        }
        .arcade-btn { transition: all 0.2s; box-shadow: 0 6px 0 rgba(0,0,0,0.1); }
        .arcade-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,0); }
        .modal-enter { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <!-- กล่องเมนูหลัก (ให้นักเรียนเข้าเล่น) -->
    <div class="bg-white/95 backdrop-blur-sm rounded-[2.5rem] shadow-2xl w-full max-w-md p-8 border-4 border-sky-200 text-center relative">
        
        <div class="text-6xl mb-4 animate-bounce inline-block">🏫</div>
        <h1 class="text-3xl md:text-4xl font-black text-sky-600 mb-2">เกมตะลุยโลกภาษี</h1>
        <p class="text-slate-500 font-bold text-sm mb-6">กรุณาพิมพ์ชื่อของนักเรียนก่อนเข้าเล่นเกมครับ ✨</p>

        <div class="space-y-4 mb-8">
            <input type="text" id="player-name-input" placeholder="พิมพ์ชื่อ-นามสกุล หรือเลขที่..." class="w-full px-4 py-3 text-center text-lg rounded-xl border-2 border-slate-200 focus:outline-none focus:border-sky-500 font-bold text-slate-700">
            
            <button onclick="enterGame()" class="arcade-btn w-full bg-sky-500 hover:bg-sky-400 text-white font-bold py-4 px-6 rounded-2xl text-xl border-b-4 border-sky-700">
                <i class="fa-solid fa-gamepad mr-2"></i> เข้าสู่ด่านที่ 1
            </button>
        </div>

        <!-- ปุ่มสำหรับ Admin -->
        <div class="mt-8 pt-4 border-t-2 border-slate-100">
            <button onclick="showAdminModal()" class="text-slate-400 hover:text-emerald-500 font-bold text-sm transition-colors flex items-center justify-center w-full gap-2">
                <i class="fa-solid fa-user-shield"></i> Admin
            </button>
        </div>
    </div>

    <!-- หน้าต่าง Popup ใส่รหัสผ่าน Admin (ซ่อนไว้เริ่มต้น) -->
    <div id="admin-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl relative modal-enter border-4 border-emerald-200 text-center">
            
            <!-- ปุ่มกากบาทปิด Popup -->
            <button onclick="hideAdminModal()" class="absolute top-4 right-4 text-slate-400 hover:text-rose-500 bg-slate-100 hover:bg-rose-50 w-8 h-8 rounded-full flex items-center justify-center transition-colors">
                <i class="fa-solid fa-xmark"></i>
            </button>
            
            <div class="text-5xl mb-3 mt-2">🔐</div>
            <h3 class="text-2xl font-black text-emerald-600 mb-1">Admin Only</h3>
            <p class="text-xs text-slate-400 font-bold mb-5">กรุณาใส่รหัสผ่านเพื่อเข้าสู่ระบบหลังบ้าน</p>
            
            <div class="space-y-3">
                <input type="password" id="admin-pwd-input" placeholder="ใส่รหัสผ่าน..." class="w-full px-4 py-3 text-center text-xl rounded-xl border-2 border-slate-200 focus:outline-none focus:border-emerald-500 tracking-widest font-bold text-slate-700" onkeypress="handleAdminEnter(event)">
                
                <!-- แจ้งเตือนเมื่อรหัสผิด -->
                <p id="admin-error" class="hidden text-rose-500 text-sm font-bold bg-rose-50 p-2 rounded-lg border border-rose-200">❌ รหัสผ่านไม่ถูกต้อง!</p>
                
                <button onclick="verifyAdmin()" class="w-full bg-emerald-500 hover:bg-emerald-400 text-white font-bold py-3 rounded-xl border-b-4 border-emerald-700 active:transform active:translate-y-1 transition-all">
                    ยืนยันรหัสผ่าน <i class="fa-solid fa-arrow-right-to-bracket ml-1"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        // ---------------------------------------------------
        // 1. ส่วนระบบของนักเรียน (เข้าเล่นเกม)
        // ---------------------------------------------------
        window.onload = function() {
            // หากนักเรียนเคยพิมพ์ชื่อไว้แล้ว ให้โหลดชื่อเดิมมาแสดงเลย
            const savedName = localStorage.getItem('playerName');
            if (savedName) {
                document.getElementById('player-name-input').value = savedName;
            }
        };

        function enterGame() {
            const nameInput = document.getElementById('player-name-input').value.trim();
            if (nameInput === "") {
                alert("⚠️ กรุณาพิมพ์ชื่อก่อนเข้าเล่นเกมนะครับ!");
                document.getElementById('player-name-input').focus();
                return;
            }
            // บันทึกชื่อลงระบบเครื่อง แล้วส่งไปหน้า game1.html
            localStorage.setItem('playerName', nameInput);
            window.location.href = "game1.html";
        }

        // ---------------------------------------------------
        // 2. ส่วนระบบของ Admin (ยืนยันรหัสผ่าน)
        // ---------------------------------------------------
        function showAdminModal() {
            document.getElementById('admin-modal').classList.remove('hidden');
            document.getElementById('admin-pwd-input').value = ""; // เคลียร์ช่องใส่รหัส
            document.getElementById('admin-error').classList.add('hidden'); // ซ่อนข้อความแจ้งเตือน
            setTimeout(() => document.getElementById('admin-pwd-input').focus(), 100);
        }

        function hideAdminModal() {
            document.getElementById('admin-modal').classList.add('hidden');
        }

        function verifyAdmin() {
            const pwd = document.getElementById('admin-pwd-input').value;
            
            // ตรวจสอบรหัสผ่านตรงนี้ครับ (รหัส: 190903)
            if (pwd === "190903") {
                // รหัสถูกต้อง: พาไปหน้าแผงควบคุมของ Coco
                window.location.href = "admin_coco.html";
            } else {
                // รหัสผิด: แสดงข้อความแจ้งเตือนสีแดง
                document.getElementById('admin-error').classList.remove('hidden');
                document.getElementById('admin-pwd-input').value = ""; // ล้างรหัสที่พิมพ์ผิด
                document.getElementById('admin-pwd-input').focus();
            }
        }

        // รองรับการกดปุ่ม Enter ในช่องใส่รหัสผ่าน
        function handleAdminEnter(e) {
            if (e.key === "Enter") {
                verifyAdmin();
            }
        }
    </script>
</body>
</html>
