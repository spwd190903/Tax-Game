<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ศูนย์รวมเกมความรู้</title>
    <!-- นำเข้า Tailwind CSS และ Font -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Mali', cursive; }
        .arcade-btn { transition: all 0.2s; box-shadow: 0 6px 0 rgba(0,0,0,0.15); }
        .arcade-btn:active { transform: translateY(6px); box-shadow: 0 0 0 rgba(0,0,0,0); }
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #e0e7ff; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #818cf8; border-radius: 10px; }
    </style>
</head>
<body class="bg-gradient-to-b from-sky-200 to-indigo-100 min-h-screen text-slate-800 flex flex-col items-center p-4">

    <h1 class="text-3xl md:text-5xl font-bold text-indigo-700 mt-8 mb-8 text-center drop-shadow-md">
        🎮 ศูนย์รวมเกมความรู้ 🌟
    </h1>

    <!-- ============================================== -->
    <!-- 1. หน้าล็อกอิน (Login Section) -->
    <!-- ============================================== -->
    <div id="login-section" class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md text-center border-4 border-indigo-200 transition-all duration-300">
        <div class="text-6xl mb-4 animate-bounce">👋</div>
        <h2 class="text-2xl font-extrabold mb-6 text-slate-700">เข้าสู่ระบบ</h2>
        <input type="text" id="player-name" placeholder="กรอกชื่อผู้เล่นของคุณ" class="w-full px-4 py-4 rounded-xl text-center border-2 border-indigo-200 focus:outline-none focus:border-indigo-500 mb-6 text-xl font-bold bg-indigo-50/50" onkeypress="if(event.key === 'Enter') login()">
        <button onclick="login()" class="arcade-btn w-full bg-indigo-500 hover:bg-indigo-400 text-white font-bold py-4 px-6 rounded-2xl text-xl">
            เริ่มใช้งาน 🚀
        </button>
    </div>

    <!-- ============================================== -->
    <!-- 2. หน้าเมนูผู้เล่นทั่วไป (Player Menu Section) -->
    <!-- ============================================== -->
    <div id="menu-section" class="hidden w-full max-w-md text-center transition-all duration-300">
        <!-- ป้ายชื่อผู้เล่น -->
        <div class="bg-white px-6 py-4 rounded-2xl shadow-md mb-6 border-2 border-indigo-200 flex justify-between items-center text-left">
            <div>
                <span class="text-slate-500 text-sm">ยินดีต้อนรับ,</span> <br>
                <span id="display-name" class="font-bold text-indigo-600 text-2xl">Player</span>
            </div>
            <button onclick="logout()" class="text-xs bg-red-400 text-white px-3 py-2 rounded-lg hover:bg-red-500 shadow transition-colors">
                <i class="fa-solid fa-right-from-bracket"></i> เปลี่ยนชื่อ
            </button>
        </div>

        <!-- ปุ่มเลือกเกม -->
        <div class="space-y-4 mb-8">
            <a href="game1.html" class="arcade-btn block w-full bg-pink-400 hover:bg-pink-300 text-white font-bold py-4 px-6 rounded-2xl text-xl text-center no-underline border-2 border-white">
                🎯 ตะลุยประเภทเงินได้
            </a>
            <a href="game2.html" class="arcade-btn block w-full bg-emerald-400 hover:bg-emerald-300 text-white font-bold py-4 px-6 rounded-2xl text-xl text-center no-underline border-2 border-white opacity-60 pointer-events-none" title="กำลังสร้างเร็วๆ นี้">
                🔒 รอด่านที่ 2 เร็วๆ นี้...
            </a>
        </div>

        <!-- กล่องสรุปคะแนนแยกรายเกม + รวมทั้งหมด -->
        <div class="bg-[#2d2a77] rounded-[2rem] p-6 text-center border-4 border-[#1e1c55] shadow-xl relative overflow-hidden">
            <div class="absolute top-0 right-0 w-32 h-32 bg-white opacity-5 rounded-full -mr-10 -mt-10 pointer-events-none"></div>
            <h3 class="text-xl font-bold text-yellow-400 mb-4 flex items-center justify-center drop-shadow-md">
                <i class="fa-solid fa-trophy mr-2 text-3xl"></i> สถิติคะแนนของคุณ
            </h3>
            
            <div class="grid grid-cols-2 gap-3 mb-4 relative z-10">
                <div class="bg-[#1e1c55] rounded-xl p-3 border border-[#3b388c] shadow-sm">
                    <p class="text-pink-300 text-[11px] sm:text-xs mb-1 font-semibold truncate">ด่าน 1: ตะลุยโลกภาษี</p>
                    <p id="game1-score-display" class="text-2xl font-bold text-white">0</p>
                </div>
                <div class="bg-[#1e1c55] rounded-xl p-3 border border-[#3b388c] shadow-sm">
                    <p class="text-emerald-300 text-[11px] sm:text-xs mb-1 font-semibold truncate">ด่าน 2: (รอด่านใหม่)</p>
                    <p id="game2-score-display" class="text-2xl font-bold text-white">0</p>
                </div>
            </div>

            <div class="bg-gradient-to-r from-[#1e1c55] to-[#2a276b] rounded-2xl p-4 border border-[#3b388c] shadow-inner relative z-10">
                <p class="text-indigo-200 text-sm mb-1 font-semibold">คะแนนสะสมรวมทั้งหมด</p>
                <div class="flex items-center justify-center">
                    <p id="total-score-display" class="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 to-yellow-500 drop-shadow-lg">0</p>
                    <span class="text-yellow-500 text-xl ml-2 mt-3 font-bold">แต้ม</span>
                </div>
            </div>
        </div>
    </div>

    <!-- ============================================== -->
    <!-- 3. หน้าแดชบอร์ดแอดมิน (Admin Section) -->
    <!-- ============================================== -->
    <div id="admin-section" class="hidden w-full max-w-3xl text-center transition-all duration-300">
        <h2 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600 mb-6 text-center drop-shadow-sm">
            <i class="fa-solid fa-user-shield mr-2 text-indigo-500"></i> แผงควบคุมสำหรับ Admin
        </h2>

        <div class="bg-white/90 rounded-3xl p-6 shadow-xl border-4 border-indigo-200 max-h-[450px] overflow-y-auto custom-scrollbar mb-6 relative">
            <div class="sticky top-0 bg-white/95 backdrop-blur-sm pb-2 border-b-2 border-indigo-100 mb-4 z-10 flex justify-between items-end">
                <h3 class="text-lg font-bold text-slate-700 text-left"><i class="fa-solid fa-clock-rotate-left mr-2"></i> ประวัติการเล่นของทุกคน</h3>
                <button onclick="loadAdminData()" class="text-sm bg-indigo-100 text-indigo-700 px-3 py-1.5 rounded-lg hover:bg-indigo-200 transition-colors">
                    <i class="fa-solid fa-arrows-rotate mr-1"></i> รีเฟรช
                </button>
            </div>
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-indigo-50 text-indigo-800 border-b-2 border-indigo-200">
                        <th class="p-3 font-bold rounded-tl-lg">ชื่อผู้เล่น</th>
                        <th class="p-3 font-bold text-center">คะแนนรวม</th>
                        <th class="p-3 font-bold text-right rounded-tr-lg">เวลาที่ทำรายการ</th>
                    </tr>
                </thead>
                <tbody id="admin-table-body">
                    <!-- ข้อมูลแอดมินจะถูกโหลดมาที่นี่ -->
                </tbody>
            </table>
        </div>

        <div class="flex justify-center">
            <button onclick="logout()" class="arcade-btn bg-white hover:bg-slate-50 border-2 border-slate-200 text-slate-600 font-bold py-3.5 px-8 rounded-full text-lg shadow-sm">
                <i class="fa-solid fa-right-from-bracket mr-2"></i> ออกจากระบบแอดมิน
            </button>
        </div>
    </div>

    <!-- ============================================== -->
    <!-- สคริปต์ Firebase และระบบทำงาน -->
    <!-- ============================================== -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        let db, appId;

        window.initFirebase = function() {
            try {
                const configString = typeof __firebase_config !== 'undefined' ? __firebase_config : null;
                if (!configString) return; 

                const firebaseConfig = JSON.parse(configString);
                const app = initializeApp(firebaseConfig);
                const auth = getAuth(app);
                db = getFirestore(app);
                appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

                signInAnonymously(auth);
            } catch (e) {
                console.error("Firebase setup error:", e);
            }
        };

        window.fetchAdminData = async function() {
            if (db) {
                try {
                    const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'global_leaderboard');
                    const q = query(colRef, orderBy('timestamp', 'desc'));
                    const snapshot = await getDocs(q);
                    const results = [];
                    snapshot.forEach(doc => {
                        const data = doc.data();
                        results.push({
                            name: data.name,
                            score: data.score,
                            timestamp: data.timestamp ? data.timestamp.toDate().toLocaleString('th-TH') : 'ไม่ระบุเวลา'
                        });
                    });
                    return results;
                } catch(e) {
                    console.error("Fetch err", e);
                    return null;
                }
            }
            return null;
        }

        window.initFirebase();
    </script>

    <script>
        // เมื่อโหลดหน้าเว็บ ตรวจสอบว่าเคยใส่ชื่อหรือยัง
        window.onload = function() {
            const savedName = localStorage.getItem('playerName');
            if (savedName) {
                checkRoleAndRoute(savedName);
            }
        };

        // ฟังก์ชันล็อกอิน
        function login() {
            const nameInput = document.getElementById('player-name').value.trim();
            if (nameInput) {
                localStorage.setItem('playerName', nameInput);
                checkRoleAndRoute(nameInput);
            } else {
                const btn = document.querySelector('#login-section button');
                btn.classList.add('bg-red-500');
                setTimeout(() => btn.classList.remove('bg-red-500'), 300);
            }
        }

        // ตรวจสอบว่าเป็น admin (coco) หรือ ผู้เล่นทั่วไป
        function checkRoleAndRoute(name) {
            // ซ่อนหน้าล็อกอิน
            document.getElementById('login-section').classList.add('hidden');

            if (name.toLowerCase() === 'coco') {
                // โชว์หน้าแอดมิน
                document.getElementById('admin-section').classList.remove('hidden');
                loadAdminData();
            } else {
                // โชว์หน้าเมนูเกม
                document.getElementById('menu-section').classList.remove('hidden');
                updatePlayerMenu(name);
            }
        }

        // อัปเดตหน้าเมนูผู้เล่น (คะแนน + ชื่อ)
        function updatePlayerMenu(name) {
            document.getElementById('display-name').innerText = name;

            // ดึงคะแนนแยกเกม
            const g1Score = parseInt(localStorage.getItem('game1Score') || '0');
            const g2Score = parseInt(localStorage.getItem('game2Score') || '0');
            const totalScore = g1Score + g2Score;
            
            // อัปเดตคะแนนรวมลง LocalStorage
            localStorage.setItem('globalScore', totalScore);

            // แสดงผล
            document.getElementById('game1-score-display').innerText = g1Score;
            document.getElementById('game2-score-display').innerText = g2Score;
            document.getElementById('total-score-display').innerText = totalScore;
        }

        // โหลดข้อมูลแอดมินมาแสดงในตาราง
        async function loadAdminData() {
            const tbody = document.getElementById('admin-table-body');
            tbody.innerHTML = '<tr><td colspan="3" class="text-center p-8 text-indigo-500 font-bold"><i class="fa-solid fa-circle-notch fa-spin text-2xl mb-2 block"></i> กำลังดึงข้อมูลประวัติผู้เล่นจากระบบ...</td></tr>';

            setTimeout(async () => {
                let data = null;
                if (window.fetchAdminData) {
                    data = await window.fetchAdminData();
                }

                if (data && data.length > 0) {
                    renderAdminTable(data);
                } else {
                    // หากเน็ตหลุด ให้ดึงข้อมูลสำรองในเครื่องมาแสดงแทน
                    const localData = JSON.parse(localStorage.getItem('localLeaderboard') || '[]');
                    if(localData.length > 0) {
                        localData.sort((a,b) => b.score - a.score);
                        renderAdminTable(localData);
                    } else {
                        tbody.innerHTML = '<tr><td colspan="3" class="text-center p-6 text-slate-500 bg-slate-50 rounded-lg border border-dashed border-slate-300">ยังไม่มีประวัติการเล่นในระบบ</td></tr>';
                    }
                }
            }, 800);
        }

        function renderAdminTable(data) {
            const tbody = document.getElementById('admin-table-body');
            let html = '';
            data.forEach(item => {
                html += `
                    <tr class="border-b border-slate-100 hover:bg-indigo-50 transition-colors">
                        <td class="p-4 font-semibold text-slate-700">${item.name}</td>
                        <td class="p-4 text-center font-bold text-indigo-600 bg-indigo-50/50">${item.score}</td>
                        <td class="p-4 text-right text-sm text-slate-500">${item.timestamp || item.date}</td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;
        }

        // ฟังก์ชันออกจากระบบ / เปลี่ยนชื่อ
        function logout() {
            localStorage.removeItem('playerName');
            location.reload();
        }
    </script>
</body>
</html>
