<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เกมภาษีพาสนุก ม.40</title>
    <!-- โหลดไลบรารีสำหรับดีไซน์และระบบเกม -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        body {
            font-family: 'Mali', cursive;
            background: #f3e8ff;
            background-image: radial-gradient(#e9d5ff 2px, transparent 2px);
            background-size: 32px 32px;
            min-height: 100vh;
        }
        .cute-panel {
            background: rgba(255, 255, 255, 0.95);
            border: 4px solid #fbcfe8;
            box-shadow: 0 12px 30px rgba(244, 63, 94, 0.08);
        }
        @keyframes pop {
            0% { transform: scale(0.95); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop { animation: pop 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div id="root" class="w-full max-w-xl"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const quizData = [
            {
                question: "นาย A เป็นพนักงานบริษัทเอกชน ได้รับ 'เงินเดือน' และ 'โบนัส' สิ้นปี ถือเป็นเงินได้พึงประเมินประเภทใด?",
                options: ["ประเภทที่ 1 (ม.40(1))", "ประเภทที่ 2 (ม.40(2))", "ประเภทที่ 4 (ม.40(4))", "ประเภทที่ 8 (ม.40(8))"],
                answer: "ประเภทที่ 1 (ม.40(1))",
                explanation: "เงินได้ประเภทที่ 1 คือ เงินได้จากการจ้างแรงงาน เช่น เงินเดือน ค่าจ้าง โบนัส เบี้ยเลี้ยง บำนาญ"
            },
            {
                question: "นางสาว B เป็นตัวแทนขายประกันชีวิต ได้รับ 'ค่านายหน้า' จากยอดขาย ถือเป็นเงินได้ประเภทใด?",
                options: ["ประเภทที่ 1 (ม.40(1))", "ประเภทที่ 2 (ม.40(2))", "ประเภทที่ 3 (ม.40(3))", "ประเภทที่ 6 (ม.40(6))"],
                answer: "ประเภทที่ 2 (ม.40(2))",
                explanation: "เงินได้ประเภทที่ 2 คือ เงินได้เนื่องจากหน้าที่หรือตำแหน่งงานที่ทำ หรือจากการรับทำงานให้ เช่น ค่านายหน้า"
            },
            {
                question: "นาย C นำเงินไปลงทุนและฝากธนาคาร จนได้รับ 'ดอกเบี้ยเงินฝาก' และ 'เงินปันผลจากหุ้น' ถือเป็นเงินได้ประเภทใด?",
                options: ["ประเภทที่ 3 (ม.40(3))", "ประเภทที่ 4 (ม.40(4))", "ประเภทที่ 5 (ม.40(5))", "ประเภทที่ 8 (ม.40(8))"],
                answer: "ประเภทที่ 4 (ม.40(4))",
                explanation: "เงินได้ประเภทที่ 4 คือ เงินได้จากการลงทุนในสินทรัพย์ทางการเงิน เช่น ดอกเบี้ย และเงินปันผล"
            }
        ];

        function App() {
            const [gameState, setGameState] = useState('start'); 
            const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
            const [score, setScore] = useState(0);
            const [attempts, setAttempts] = useState(0);
            const [feedback, setFeedback] = useState(null); 
            const [playerName, setPlayerName] = useState('coco');

            useEffect(() => {
                const name = localStorage.getItem('playerName') || 'coco';
                setPlayerName(name);
            }, []);

            useEffect(() => {
                if (gameState === 'end') {
                    localStorage.setItem('game1Score', score);
                    const g2Score = parseInt(localStorage.getItem('game2Score') || '0');
                    const currentGlobalScore = score + g2Score;
                    localStorage.setItem('globalScore', currentGlobalScore);

                    // เรียกใช้ฟังก์ชันส่งคะแนนแบบปลอดภัย
                    if (typeof window.saveScoreToCloud === 'function') {
                        window.saveScoreToCloud(score, currentGlobalScore);
                    }

                    if(window.confetti) {
                        confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
                    }
                }
            }, [gameState]);

            const startGame = () => {
                setGameState('playing');
                setCurrentQuestionIndex(0);
                setScore(0);
                setAttempts(0);
                setFeedback(null);
            };

            const handleAnswer = (selectedOption) => {
                if (feedback && (feedback.status === 'correct' || feedback.status === 'skip')) return;

                const currentQuestion = quizData[currentQuestionIndex];
                const isCorrect = selectedOption === currentQuestion.answer;

                if (isCorrect) {
                    let points = 10;
                    if (attempts === 1) points = 5;
                    else if (attempts === 2) points = 2;

                    setScore(prev => prev + points);
                    setFeedback({ status: 'correct', message: `🎉 ถูกต้องยอดเยี่ยม! ได้รับ +${points} คะแนน` });
                    
                    setTimeout(() => { nextQuestion(); }, 2500);
                } else {
                    const nextAttempts = attempts + 1;
                    if (nextAttempts >= 3) {
                        setScore(prev => Math.max(0, prev - 5)); 
                        setFeedback({ status: 'skip', message: `😭 ผิดครบ 3 ครั้งแล้ว! ระบบขอข้ามและหักคะแนน -5 แต้ม` });
                        setTimeout(() => { nextQuestion(); }, 3000);
                    } else {
                        setAttempts(nextAttempts);
                        setFeedback({ status: 'incorrect', message: `❌ ยังไม่ถูกนะ! ลองคิดใหม่อีกที (เหลืออีก ${3 - nextAttempts} ครั้ง)` });
                    }
                }
            };

            const nextQuestion = () => {
                if (currentQuestionIndex + 1 < quizData.length) {
                    setCurrentQuestionIndex(prev => prev + 1);
                    setAttempts(0);
                    setFeedback(null);
                } else {
                    setGameState('end');
                }
            };

            if (gameState === 'start') {
                return (
                    <div className="cute-panel p-8 rounded-3xl text-center animate-pop">
                        <h1 className="text-3xl font-bold text-purple-600 mb-1">เกมที่ 1: ตะลุยโลกภาษี</h1>
                        <p className="text-gray-500 mb-6 text-sm">ยินดีต้อนรับผู้เล่นคนเก่ง! ✨</p>
                        
                        <div className="bg-pink-50 border-2 border-pink-100 p-5 rounded-2xl mb-6 text-left text-sm text-gray-700">
                            <h3 className="font-bold text-pink-600 mb-3 text-base">⭐ กติกาการเล่น:</h3>
                            <div className="space-y-2">
                                <p className="flex items-center gap-2"><span className="bg-green-400 text-white w-5 h-5 rounded-full flex items-center justify-center text-xs font-bold">1</span> ตอบถูกครั้งแรก: <span className="text-green-600 font-bold">+10 คะแนน</span></p>
                                <p className="flex items-center gap-2"><span className="bg-blue-400 text-white w-5 h-5 rounded-full flex items-center justify-center text-xs font-bold">2</span> ตอบถูกครั้งที่ 2: <span className="text-blue-600 font-bold">+5 คะแนน</span></p>
                                <p className="flex items-center gap-2"><span className="bg-purple-400 text-white w-5 h-5 rounded-full flex items-center justify-center text-xs font-bold">3</span> ตอบถูกครั้งที่ 3: <span className="text-purple-600 font-bold">+2 คะแนน</span></p>
                            </div>
                            <div className="mt-4 bg-red-100 text-red-700 p-2.5 rounded-xl font-medium text-xs flex items-center gap-1.5">
                                <i className="fa-solid fa-circle-exclamation"></i> ตอบผิด 3 ครั้ง: -5 คะแนน และบังคับข้าม!
                            </div>
                        </div>

                        <div className="space-y-3">
                            <button onClick={startGame} className="w-full bg-gradient-to-r from-pink-400 to-purple-500 hover:from-pink-500 hover:to-purple-600 text-white font-bold py-4 rounded-full shadow-md text-lg transition-transform active:scale-95 flex items-center justify-center gap-2">
                                เริ่มตะลุยด่าน! <i className="fa-solid fa-paper-plane"></i>
                            </button>
                            <button onClick={() => window.location.href = 'index.html'} className="w-full bg-white hover:bg-gray-50 text-gray-500 border-2 border-gray-200 font-bold py-3 rounded-full shadow-sm text-base flex items-center justify-center gap-2">
                                <i className="fa-solid fa-house"></i> กลับหน้าหลัก
                            </button>
                        </div>
                    </div>
                );
            }

            if (gameState === 'end') {
                return (
                    <div className="cute-panel p-8 rounded-3xl text-center animate-pop">
                        <div className="text-5xl mb-3">👑</div>
                        <h2 className="text-2xl font-bold text-gray-800 mb-4">เก่งมากเล่นจบแล้ว!</h2>
                        <div className="bg-purple-50 border-2 border-purple-100 py-4 px-6 rounded-2xl inline-block mb-6">
                            <span className="block text-xs text-purple-500 font-bold">คะแนนที่ได้</span>
                            <span className="text-4xl font-bold text-purple-600">{score}</span>
                        </div>
                        <div className="space-y-3">
                            <button onClick={startGame} className="w-full bg-green-400 hover:bg-green-500 text-white font-bold py-3.5 rounded-full shadow-md text-base transition-transform active:scale-95">
                                <i className="fa-solid fa-rotate-left mr-1"></i> เล่นอีกรอบ
                            </button>
                            <button onClick={() => window.location.href = 'index.html'} className="w-full bg-white hover:bg-gray-50 text-gray-500 border-2 border-gray-200 font-bold py-3 rounded-full shadow-sm text-base">
                                <i className="fa-solid fa-house mr-1"></i> กลับหน้าหลัก
                            </button>
                        </div>
                    </div>
                );
            }

            const currentQuestion = quizData[currentQuestionIndex];

            return (
                <div className="cute-panel p-6 rounded-3xl animate-pop">
                    <div className="flex justify-between items-center mb-4 pb-3 border-b-2 border-dashed border-purple-100">
                        <span className="text-sm font-bold text-purple-500 bg-purple-50 px-3 py-1 rounded-full">ข้อ {currentQuestionIndex + 1}/{quizData.length}</span>
                        <span className="text-sm font-bold text-white bg-pink-400 px-3 py-1 rounded-full shadow-sm">คะแนน: {score}</span>
                    </div>

                    <h2 className="text-base sm:text-lg font-bold text-gray-700 mb-4 leading-relaxed">{currentQuestion.question}</h2>

                    <div className="space-y-3 mb-4">
                        {currentQuestion.options.map((option, idx) => {
                            let btnStyle = "bg-white border-2 border-gray-100 text-gray-600 hover:bg-pink-50 hover:border-pink-300";
                            if (feedback && (feedback.status === 'correct' || feedback.status === 'skip') && option === currentQuestion.answer) {
                                btnStyle = "bg-green-400 border-green-500 text-white font-bold";
                            }
                            const disabled = feedback && (feedback.status === 'correct' || feedback.status === 'skip');

                            return (
                                <button key={idx} onClick={() => handleAnswer(option)} disabled={disabled} className={`w-full p-3.5 rounded-xl text-left text-sm font-medium transition-all shadow-sm ${btnStyle}`}>
                                    {option}
                                </button>
                            );
                        })}
                    </div>

                    {feedback && (
                        <div className={`p-3 rounded-xl text-xs sm:text-sm font-bold mb-2 ${feedback.status === 'correct' ? 'bg-green-50 text-green-700' : feedback.status === 'skip' ? 'bg-red-50 text-red-700' : 'bg-yellow-50 text-yellow-700'}`}>
                            {feedback.message}
                        </div>
                    )}
                </div>
            );
        }

        // มั่นใจได้ว่า React จะเรนเดอร์สำเร็จเสมอแม้สคริปต์ภายนอกทำงานช้า
        window.addEventListener('DOMContentLoaded', () => {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        });
    </script>

    <!-- ========================================== -->
    <!-- ระบบส่งคะแนนแบบป้องกัน Error 100% -->
    <!-- ========================================== -->
    <script type="module">
        try {
            const { getFirestore, doc, setDoc, serverTimestamp } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");

            window.saveScoreToCloud = async function(game1Score, totalScore) {
                const playerName = localStorage.getItem('playerName') || 'coco';
                try {
                    if (typeof shadow !== 'undefined' && typeof shadow.getApp === 'function') {
                        const app = shadow.getApp();
                        const db = getFirestore(app);
                        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
                        
                        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'global_leaderboard', playerName);
                        await setDoc(docRef, {
                            name: playerName,
                            game1Score: parseInt(game1Score),
                            score: parseInt(totalScore),
                            admin: "coco",
                            adminName: "coco",
                            timestamp: serverTimestamp()
                        }, { merge: true });
                        
                        console.log("ส่งสรุปคะแนนเข้าบัญชีแอดมิน coco เรียบร้อย!");
                    } else {
                        console.warn("ระบบจำลองยังไม่เปิดใช้งาน คะแนนจะถูกเซฟไว้ในเครื่องก่อน");
                    }
                } catch (e) {
                    console.error("Firebase Storage Error: ", e);
                }
            }
        } catch (globalError) {
            console.error("โมดูลหลักไม่สามารถโหลดได้ ตัวเกมสแตนด์อโลนเริ่มทำงานแทน:", globalError);
        }
    </script>
</body>
</html>
