            showStartScreen();
        };

        // ฟังก์ชันสลับคำถาม (Shuffle)
        function shuffleArray(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

                    <h1 class="text-3xl font-bold text-purple-600 mb-2">เกมที่ 1: ตะลุยโลกภาษี</h1>
                    <p class="text-gray-500 mb-6 text-sm">ยินดีต้อนรับผู้เล่นคนเก่ง <span class="font-bold text-pink-500">${playerName}</span>! ✨ มาท้าทายความรู้กัน</p>
                    
                    <div class="bg-pink-50 border-2 border-pink-100 p-5 rounded-2xl mb-6 text-left text-sm text-gray-700">
                        <h3 class="font-bold text-pink-600 mb-3 text-base">⭐ กติกาการเล่น (สุ่ม 15 ข้อ):</h3>
                        <div class="space-y-2">
                            <p class="flex items-center gap-2"><span class="bg-green-400 text-white w-5 h-5 rounded-full flex items-center justify-center text-xs font-bold shadow-sm">1</span> ตอบถูกครั้งแรก: <span class="text-green-600 font-bold">+10 คะแนน</span></p>
                            <p class="flex items-center gap-2"><span class="bg-blue-400 text-white w-5 h-5 rounded-full flex items-center justify-center text-xs font-bold shadow-sm">2</span> ตอบถูกครั้งที่ 2: <span className="text-blue-600 font-bold">+5 คะแนน</span></p>
                            <p class="flex items-center gap-2"><span class="bg-purple-400 text-white w-5 h-5 rounded-full flex items-center justify-center text-xs font-bold shadow-sm">3</span> ตอบถูกครั้งที่ 3: <span class="text-purple-600 font-bold">+2 คะแนน</span></p>
                        </div>
                        <div class="mt-4 bg-red-100 text-red-700 p-3 rounded-xl font-medium text-xs sm:text-sm flex items-center gap-2">
                            <i class="fa-solid fa-triangle-exclamation text-lg"></i> ตอบผิด 3 ครั้ง: หัก 5 คะแนน & บังคับข้ามทันที!
                        </div>
                    </div>

                    <div class="space-y-3">
                        <button onclick="startGame()" class="w-full bg-gradient-to-r from-pink-400 to-purple-500 hover:from-pink-500 hover:to-purple-600 text-white font-bold py-4 rounded-full shadow-md text-lg transition-transform active:scale-95 flex items-center justify-center gap-2">
                            เริ่มตะลุยด่าน (สุ่มข้อสอบ)! <i class="fa-solid fa-paper-plane"></i>
                        </button>
                        <button onclick="window.location.href = 'index.html'" class="w-full bg-white hover:bg-gray-50 text-gray-500 border-2 border-gray-200 font-bold py-3.5 rounded-full shadow-sm text-base flex items-center justify-center gap-2">
                            <i class="fa-solid fa-house"></i> กลับหน้าหลัก
                        </button>
                    </div>
                </div>
            `;
        }

        // เริ่มเกมและทำการสุ่มคำถาม
        function startGame() {
            quizList = shuffleArray(allQuestions);
            currentIndex = 0;
            score = 0;
            attempts = 0;
            isAnswered = false;
            showQuestionScreen();
        }

        // ==========================================
        // 2. หน้าจอเล่นเกมคำถาม (Question Screen)
        // ==========================================
        function showQuestionScreen() {
            const currentQuestion = quizList[currentIndex];
            isAnswered = false;
            
            const container = document.getElementById('game-container');
            container.innerHTML = `
                <div id="playing-card" class="cute-panel animate-pop shadow-xl">
                    <div class="flex justify-between items-center mb-5 pb-3 border-b-2 border-dashed border-purple-100">
                        <div class="flex items-center gap-3">
                            <button onclick="window.location.href = 'index.html'" class="bg-gray-100 hover:bg-pink-100 text-gray-500 w-10 h-10 rounded-full flex justify-center items-center">
                                <i class="fa-solid fa-house"></i>
                            </button>
                            <span class="text-sm font-bold text-purple-600 bg-purple-50 px-3 py-1.5 rounded-full">
                                ข้อ ${currentIndex + 1} / ${quizList.length}
                            </span>
                        </div>
                        <span class="text-sm font-bold text-white bg-pink-400 px-4 py-1.5 rounded-full">
                            คะแนน: ${score}
                        </span>
                    </div>

                    <h2 class="text-base sm:text-lg font-bold text-gray-700 mb-6 bg-slate-50 p-4 rounded-2xl border border-slate-100">
                        ${currentQuestion.question}
                    </h2>

                    <div class="space-y-3 mb-5" id="options-box">
                        ${currentQuestion.options.map((option, idx) => `
                            <button onclick="checkAnswer(this, '${option.replace(/'/g, "\\'")}')" class="option-btn">
                                ${option}
                            </button>
                        `).join('')}
                    </div>

                    <div id="feedback-box" class="hidden p-4 rounded-xl text-sm font-bold mb-3"></div>

                    <div id="explanation-box" class="hidden bg-slate-50 border border-slate-200 p-4 rounded-2xl animate-pop text-sm text-slate-600">
                        <span class="font-bold text-blue-500 block mb-1"><i class="fa-solid fa-lightbulb"></i> คำอธิบาย:</span>
                        <p id="explanation-text"></p>
                    </div>

                    <div id="attempts-box" class="text-center mt-3 text-xs text-gray-500 bg-gray-100 py-1.5 px-3 rounded-full inline-block mx-auto w-full">
                        <i class="fa-solid fa-circle-exclamation mr-1 text-yellow-500"></i> โอกาสตอบผิดที่เหลือ: <span id="attempts-left">3</span> ครั้งก่อนโดนข้าม
                    </div>
                </div>
            `;
            document.getElementById('attempts-left').innerText = 3 - attempts;
        }

        // ฟังก์ชันตรวจคำตอบ
        function checkAnswer(btnElement, selectedVal) {
            if (isAnswered) return;

            const currentQuestion = quizList[currentIndex];
            const isCorrect = selectedVal === currentQuestion.answer;
            const optionsBox = document.getElementById('options-box');

            if (isCorrect) {
                isAnswered = true;
                btnElement.classList.add('option-correct');
                
                // คำนวณคะแนนตามจำนวนครั้งที่ตอบผิด
                let points = 10;
                if (attempts === 1) points = 5;
                else if (attempts === 2) points = 2;

                score += points;

                // อัปเดต UI ข้อความอธิบาย
                showFeedback(`🎉 ยอดเยี่ยม! คุณตอบถูก ได้รับ +${points} คะแนน`, 'correct');
                showExplanation(currentQuestion.explanation);
                disableAllButtons();

                // เปลี่ยนหน้าไปข้อถัดไป
                setTimeout(() => {
                    nextQuestion();
                }, 3000);

            } else {
                btnElement.classList.add('option-wrong');
                btnElement.disabled = true;
                attempts++;

                const playingCard = document.getElementById('playing-card');
                playingCard.classList.add('animate-shake');
                setTimeout(() => playingCard.classList.remove('animate-shake'), 500);

                if (attempts >= 3) {
                    isAnswered = true;
                    score = Math.max(0, score - 5); // ป้องกันคะแนนรวมติดลบ

                    // บังคับเปลี่ยนสีปุ่มเฉลยข้อที่ถูกเป็นสีเขียว
                    highlightCorrectAnswer(currentQuestion.answer);

                    showFeedback(`😭 ผิดครบ 3 ครั้งแล้ว! ระบบขอนำข้ามข้อนี้และหัก -5 แต้ม`, 'skip');
                    showExplanation(currentQuestion.explanation);
                    disableAllButtons();

                    setTimeout(() => {
                        nextQuestion();
                    }, 4000);
                } else {
                    document.getElementById('attempts-left').innerText = 3 - attempts;
                    showFeedback(`❌ ยังไม่ถูกนะจ๊ะ! ลองคิดใหม่อีกครั้งนะ (เหลืออีก ${3 - attempts} ครั้ง)`, 'incorrect');
                }
            }
        }

        function highlightCorrectAnswer(correctAnswer) {
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(btn => {
                if (btn.innerText.trim() === correctAnswer) {
                    btn.classList.add('option-correct');
                }
            });
        }

        function disableAllButtons() {
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(btn => btn.disabled = true);
            document.getElementById('attempts-box').classList.add('hidden');
        }

        function showFeedback(msg, status) {
            const feedbackBox = document.getElementById('feedback-box');
            feedbackBox.classList.remove('hidden', 'bg-green-50', 'text-green-700', 'bg-red-50', 'text-red-700', 'bg-yellow-50', 'text-yellow-700');
            feedbackBox.innerText = msg;

            if (status === 'correct') {
                feedbackBox.classList.add('bg-green-50', 'text-green-700', 'border', 'border-green-200');
            } else if (status === 'skip') {
                feedbackBox.classList.add('bg-red-50', 'text-red-700', 'border', 'border-red-200');
            } else {
                feedbackBox.classList.add('bg-yellow-50', 'text-yellow-700', 'border', 'border-yellow-200');
            }
        }

        function showExplanation(text) {
            const explanationBox = document.getElementById('explanation-box');
            document.getElementById('explanation-text').innerText = text;
            explanationBox.classList.remove('hidden');
        }

        function nextQuestion() {
            if (currentIndex + 1 < quizList.length) {
                currentIndex++;
                attempts = 0;
                showQuestionScreen();
            } else {
                showEndScreen();
            }
        }

        // ==========================================
        // 3. หน้าจอจบเกม (End Screen) และส่งไปคลาวด์
        // ==========================================
        function showEndScreen() {
            // บันทึกลง LocalStorage
            localStorage.setItem('game1Score', score);
            const g2Score = parseInt(localStorage.getItem('game2Score') || '0');
            const totalScore = score + g2Score;
            localStorage.setItem('globalScore', totalScore);

            const container = document.getElementById('game-container');
            container.innerHTML = `
                <div class="cute-panel text-center animate-pop">
                    <div class="text-6xl mb-4">🏆</div>
                    <h2 class="text-2xl font-bold text-gray-800 mb-2">เก่งมาก! ทำครบ 15 ข้อแล้ว</h2>
                    <p class="text-gray-500 text-sm mb-6" id="cloud-status-text">🔄 กำลังส่งรายงานคะแนนไปให้แอดมิน coco บนคลาวด์...</p>

                    <div class="bg-purple-50 border-2 border-purple-100 py-5 px-8 rounded-3xl inline-block mb-8 shadow-inner">
                        <span class="block text-sm text-purple-500 font-bold mb-1">คะแนนด่าน 1 ที่ได้</span>
                        <span class="text-6xl font-black text-purple-600 drop-shadow-md">${score}</span>
                        <span class="text-sm font-bold text-purple-400 ml-1">/ 150</span>
                    </div>
                    
                    <div class="space-y-3">
                        <button onclick="startGame()" class="w-full bg-green-400 hover:bg-green-500 text-white font-bold py-4 rounded-full shadow-md transition-transform active:scale-95">
                            <i class="fa-solid fa-rotate-left mr-1"></i> เล่นอีกรอบ (สุ่มข้อสอบใหม่)
                        </button>
                        <button onclick="window.location.href = 'index.html'" class="w-full bg-white hover:bg-gray-50 text-gray-600 border-2 border-gray-200 font-bold py-3.5 rounded-full shadow-sm text-base">
                            <i class="fa-solid fa-house mr-1"></i> ดูคะแนนรวมที่หน้าหลัก
                        </button>
                    </div>
                </div>
            `;

            // ยิงเอฟเฟกต์จุดพลุฉลองกลางหน้าจอ
            if (window.confetti) {
                confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } });
            }

            // สั่งฟังก์ชันส่งคะแนนไปยังคลาวด์ Google Sheets และ Firebase แอดมิน coco
            sendScoresToCloud(score, totalScore);
        }

        // =======================================================
        // ฟังก์ชันยิงข้อมูลไปหา Google Sheets และ Firebase
        // =======================================================
        async function sendScoresToCloud(game1Score, totalScore) {
            const statusText = document.getElementById('cloud-status-text');

            // 1. ยิงข้อมูลไปที่ Google Sheets (คุณครู) ของจริง 100%
            try {
                // ยิง POST ข้ามเซิร์ฟเวอร์แบบ No-CORS (ปลอดภัยและไม่พังหน้างาน)
                await fetch(GOOGLE_SHEET_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: playerName,
                        game1Score: parseInt(game1Score),
                        totalScore: parseInt(totalScore)
                    })
                });
                
                if (statusText) {
                    statusText.innerHTML = `✅ บันทึกคะแนนลง Google Sheets และส่งให้แอดมิน coco เรียบร้อยแล้ว!`;
                    statusText.classList.remove('text-gray-500');
                    statusText.classList.add('text-green-600', 'font-bold');
                }
            } catch (err) {
                console.error("Google Sheets Error:", err);
                if (statusText) {
                    statusText.innerText = "❌ การยิงคะแนนเข้า Google Sheets ติดขัดเล็กน้อย แต่อยู่ในเครื่องแล้ว!";
                }
            }

            // 2. เรียกใช้งานระบบส่งประวัติเข้าหลังบ้านแอดมิน coco ในส่วนโมดูล Firebase
            if (typeof window.saveToFirebaseCloud === 'function') {
                window.saveToFirebaseCloud(game1Score, totalScore);
            }
        }
    </script>

    <!-- ========================================== -->
    <!-- ส่วนของ Firebase: บันทึกเข้า Leaderboard แอดมิน coco -->
    <!-- ========================================== -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        let db, appId;

        async function initFirebase() {
            try {
                const configString = typeof __firebase_config !== 'undefined' ? __firebase_config : null;
                if (!configString) return; 

                const firebaseConfig = JSON.parse(configString);
                const app = initializeApp(firebaseConfig);
                const auth = getAuth(app);
                db = getFirestore(app);
                appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (e) {
                console.error("Firebase setup error:", e);
            }
        }

        window.saveToFirebaseCloud = async function(game1Score, totalScore) {
            const player = localStorage.getItem('playerName') || 'ผู้เล่นทั่วไป';
            if (!db) return;

            try {
                // บันทึกและส่งชื่อ-คะแนน-แอดมินไปที่ตาราง leaderboard ส่วนกลางของแอป
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'global_leaderboard', player);
                await setDoc(docRef, {
                    name: player,
                    game1Score: parseInt(game1Score),
                    score: parseInt(totalScore),
                    admin: "coco",
                    adminName: "coco",
                    timestamp: serverTimestamp()
                }, { merge: true });
                console.log("ส่งประวัติไปหา coco บน Cloud Firebase สำเร็จ!");
            } catch (e) {
                console.error("Firebase Save Score Error: ", e);
            }
        };

        initFirebase();
    </script>
