<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ศูนย์รวมภารกิจ - แผนที่ตะลุยโลกภาษี</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            font-family: 'Mali', cursive;
            background-color: #e0f2fe;
            background-image: radial-gradient(#bae6fd 1.5px, transparent 1.5px), radial-gradient(#bae6fd 1.5px, #e0f2fe 1.5px);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
        }
        .arcade-btn { transition: all 0.2s; box-shadow: 0 6px 0 rgba(0,0,0,0.1); }
        .arcade-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,0); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div class="bg-white/95 backdrop-blur-sm rounded-[2.5rem] shadow-2xl w-full max-w-md p-8 border-4 border-sky-200 text-center">
        
        <div class="text-6xl mb-4 inline-block bg-sky-100 p-4 rounded-full animate-pulse">🗺️</div>
        <h1 class="text-3xl font-black text-sky-600 mb-2">แผนที่ภารกิจ</h1>
        <p class="text-slate-400 font-bold text-xs mb-6">ระบบจะบันทึกด่านและคะแนนสะสมให้อัตโนมัติ</p>
        
        <div class="bg-slate-50 rounded-2xl p-5 mb-6 border-2 border-slate-100">
            <h2 id="display-name" class="text-xl font-bold text-slate-700 mb-4 text-left border-b pb-2">🧑‍🎓 ชื่อ: โหลดข้อมูล...</h2>
            
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-indigo-50 p-3 rounded-xl border border-indigo-100">
                    <p class="text-xs text-indigo-500 font-bold mb-1">ด่านปัจจุบัน</p>
                    <p id="display-level" class="text-3xl font-black text-indigo-700">1</p>
                </div>
                <div class="bg-amber-50 p-3 rounded-xl border border-amber-100">
                    <p class="text-xs text-amber-500 font-bold mb-1">คะแนนสะสมรวม</p>
                    <p id="display-score" class="text-3xl font-black text-amber-500">0</p>
                </div>
            </div>
        </div>

        <div class="space-y-3">
            <button id="btn-continue" onclick="continueGame()" class="arcade-btn w-full bg-emerald-500 hover:bg-emerald-400 text-white font-bold py-4 px-6 rounded-2xl text-xl border-b-4 border-emerald-700 flex justify-center items-center gap-2">
                <i class="fa-solid fa-circle-play"></i> <span id="btn-continue-text">เข้าสู่ด่านที่ 1</span>
            </button>
            
            <button onclick="restartGame()" class="arcade-btn w-full bg-rose-500 hover:bg-rose-400 text-white font-bold py-3 px-6 rounded-2xl text-sm border-b-4 border-rose-700 flex justify-center items-center gap-2">
                <i class="fa-solid fa-arrow-rotate-left"></i> ไม่พอใจคะแนน ขอเริ่มใหม่ตั้งแต่ด่าน 1
            </button>
        </div>
    </div>

    <script>
        // ดึงข้อมูลจากระบบความจำของเบราว์เซอร์ (localStorage)
        let playerName = localStorage.getItem('playerName') || 'ผู้เล่นนิรนาม';
        let currentLevel = parseInt(localStorage.getItem('currentLevel')) || 1;
        let totalScore = parseInt(localStorage.getItem('totalScore')) || 0;

        // นำข้อมูลไปแปะแสดงผลบนหน้าจอให้ถูกต้อง
        document.getElementById('display-name').innerText = "🧑‍🎓 ชื่อ: " + playerName;
        document.getElementById('display-score').innerText = totalScore;

        // เช็คสถานะด่านของผู้เล่นเพื่อเปลี่ยนข้อความบนปุ่ม
        if (currentLevel > 4) {
            // ถ้าด่านเกินด่าน 4 แปลว่าเรียนจบครบหมดแล้ว
            document.getElementById('display-level').innerText = "จบเกม 🎉";
            document.getElementById('btn-continue-text').innerText = "พิชิตภารกิจสำเร็จแล้ว!";
            
            // ล็อคปุ่มไม่ให้กดเข้าด่านต่อ
            const btnContinue = document.getElementById('btn-continue');
            btnContinue.disabled = true;
            btnContinue.classList.remove('bg-emerald-500', 'hover:bg-emerald-400', 'border-emerald-700');
            btnContinue.classList.add('bg-slate-300', 'border-slate-400', 'cursor-not-allowed');
        } else {
            // ถ้ายังเล่นไม่ครบ โชว์เลขด่านปกติ
            document.getElementById('display-level').innerText = "ด่านที่ " + currentLevel;
            document.getElementById('btn-continue-text').innerText = "เข้าสู่ด่านที่ " + currentLevel;
        }

        // ฟังก์ชันกดเข้าเล่นด่านปัจจุบัน
        function continueGame() {
            if (currentLevel <= 4) {
                window.location.href = "game" + currentLevel + ".html";
            }
        }

        // ฟังก์ชันล้างคะแนนเพื่อเริ่มเล่นใหม่ตั้งแต่ด่าน 1
        function restartGame() {
            if(confirm("⚠️ คำเตือน: คะแนนสะสมทั้งหมดจะถูกรีเซ็ตเป็น 0 และต้องเริ่มเล่นใหม่ตั้งแต่ด่านที่ 1 ยืนยันที่จะเริ่มใหม่ใช่ไหมครับ?")) {
                localStorage.setItem('currentLevel', 1);
                localStorage.setItem('totalScore', 0);
                // พารีเฟรชกลับไปเริ่มด่าน 1 ใหม่
                window.location.href = "game1.html";
            }
        }
    </script>
</body>
</html>
